<!doctype html>
<html>
  <head>
    <title>Item Display</title>
    <script src="item-list.js"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="main-container">
      <div>
        <h2>Item Display</h2>
      </div>
      <div>
        <select name="item-list" id="item-list" class="select"></select>
      </div>
      <hr />
      <div class="prop-row">
        <div class="prop-name">ID</div>
        <div id="item-id"></div>
      </div>
      <div class="prop-row">
        <div class="prop-name">Name</div>
        <div id="item-name"></div>
      </div>
      <div class="prop-row">
        <div class="prop-name">Category</div>
        <div id="item-category"></div>
      </div>
      <div class="prop-row">
        <div class="prop-name">Inventory Amt.</div>
        <div id="item-inventory"></div>
      </div>
      <div class="prop-row">
        <div class="prop-name">List price</div>
        <div id="item-price"></div>
      </div>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const select = document.getElementById("item-list");
        
        select.innerHTML = '<option value="">-- Select an Item --</option>';
        items.forEach(item => {
          select.innerHTML += `<option value="${item.id}">${item.name}</option>`;
        });

        select.addEventListener("change", (e) => {
          const match = items.find(item => item.id === Number(e.target.value)) || {};

          document.getElementById("item-id").textContent = match.id || "";
          document.getElementById("item-name").textContent = match.name || "";
          document.getElementById("item-category").textContent = match.category || "";
          document.getElementById("item-inventory").textContent = match.inventory || "";
          document.getElementById("item-price").textContent = match.price ? `${match.price}` : "";
        });
      });
    </script>
  </body>
</html>
